[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev          ; 手上的 ESP32 开发板；换板改这里
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.9.0
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17      ; 网页配网（captive portal），自管 NVS 凭据
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED   ; 打样默认单颗 RGB LED

[env:esp32_ring]
extends = env:esp32
build_flags =
    -DDISPLAY_TYPE=DISPLAY_WS2812_RING

; —— BLE 兜底状态推送 env（Part B②，独立·可选）——
; 只有这个 env 带 -DENABLE_BLE，编入 BLE GATT 状态服务；
; BLE+WiFi+FastLED 撑爆默认 1.2MB 分区，故用 min_spiffs 大分区表。
; esp32 / esp32_ring 默认构建不受影响，产物不含 BLE。
[env:esp32_ble]
extends = env:esp32
board_build.partitions = min_spiffs.csv
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED
    -DENABLE_BLE

[env:native]
platform = native
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED
    -std=gnu++17
build_src_filter = -<*> +<render_engine.cpp>
test_build_src = yes
test_filter = test_render_engine
