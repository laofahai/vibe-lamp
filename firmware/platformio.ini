[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev          ; 手上的 ESP32 开发板；换板改这里
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.9.0
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17      ; 网页配网（captive portal），自管 NVS 凭据
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED   ; 打样默认单颗 RGB LED

[env:esp32_ring]
extends = env:esp32
build_flags =
    -DDISPLAY_TYPE=DISPLAY_WS2812_RING

; —— ESP32-C3 SuperMini（单颗共阴 RGB LED 模块）——
; C3 与经典 ESP32 同 Arduino 内核，只换 board+引脚，业务代码零改。
; 接线：模块 B/G/R → GPIO5/6/7（模块自带限流电阻），GND → C3 GND，高电平点亮（共阴）。
;   GPIO5→B（蓝）  GPIO6→G（绿）  GPIO7→R（红）
; GPIO5/6/7 避开 C3 的 strapping 脚 2/8/9、原生 USB 脚 18/19、UART 脚 20/21。
[env:c3_rgb]
extends = env:esp32
board = esp32-c3-devkitm-1
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED
    -DPIN_RGB_B=5
    -DPIN_RGB_G=6
    -DPIN_RGB_R=7
    -DPIN_RESET_BTN=10    ; Core V1 清网按钮接 GPIO10（C3 非 strapping）；SuperMini 无按钮时读高=未按，无害
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; —— BLE 兜底状态推送 env（Part B②，独立·可选）——
; 只有这个 env 带 -DENABLE_BLE，编入 BLE GATT 状态服务；
; BLE+WiFi+FastLED 撑爆默认 1.2MB 分区，故用 min_spiffs 大分区表。
; esp32 / esp32_ring 默认构建不受影响，产物不含 BLE。
[env:esp32_ble]
extends = env:esp32
board_build.partitions = min_spiffs.csv
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED
    -DENABLE_BLE

[env:native]
platform = native
build_flags =
    -DDISPLAY_TYPE=DISPLAY_RGB_LED
    -std=gnu++17
; 纯逻辑文件（零 Arduino 依赖）才能编进 native：render 引擎 + WiFi 多网凭据表
build_src_filter = -<*> +<render_engine.cpp> +<wifi_cred_list.cpp>
test_build_src = yes
test_filter =
    test_render_engine
    test_wifi_cred
