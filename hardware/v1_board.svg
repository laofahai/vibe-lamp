<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760">
  <defs>
    <style>
      .title{font:700 28px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .label{font:600 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
      .tiny{font:12px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}
      .board{fill:#0f8f66;stroke:#065f46;stroke-width:4}
      .copper{fill:#d6a737;stroke:#8a5a13;stroke-width:2}
      .part{fill:#f8fafc;stroke:#334155;stroke-width:2}
      .dark{fill:#1f2937;stroke:#111827;stroke-width:2}
      .module{fill:#e5e7eb;stroke:#374151;stroke-width:2}
      .keepout{fill:#fef3c7;stroke:#d97706;stroke-width:2;stroke-dasharray:8 6}
      .trace{fill:none;stroke:#fef08a;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .dim{fill:none;stroke:#64748b;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="760" fill="#f3f4f6"/>
  <text x="40" y="58" class="title">Vibe Lamp Core V1 - no-solder SMT prototype</text>
  <text x="40" y="88" class="small">28 x 28 mm board, factory-assembled. User only plugs USB-C. RGB LED is the main display; WS2812 is a future expansion pad.</text>

  <!-- board -->
  <rect x="320" y="120" width="360" height="360" rx="34" class="board"/>
  <text x="431" y="514" class="label">Top view</text>
  <text x="400" y="538" class="small">rounded square PCB, 28 x 28 mm</text>

  <!-- USB-C -->
  <rect x="430" y="94" width="140" height="52" rx="8" class="dark"/>
  <rect x="456" y="108" width="88" height="18" rx="6" fill="#9ca3af"/>
  <text x="584" y="126" class="label">USB-C</text>
  <text x="584" y="147" class="tiny">5V power + native USB</text>

  <!-- antenna keepout -->
  <rect x="372" y="138" width="256" height="64" rx="10" class="keepout"/>
  <text x="397" y="174" class="label">antenna keepout</text>
  <text x="392" y="194" class="tiny">no copper / no metal above</text>

  <!-- ESP32 module -->
  <rect x="392" y="214" width="216" height="118" rx="8" class="module"/>
  <text x="430" y="264" class="label">ESP32-C3-MINI-1</text>
  <text x="434" y="289" class="small">assembled by factory</text>
  <circle cx="414" cy="230" r="4" class="copper"/>
  <circle cx="586" cy="230" r="4" class="copper"/>
  <circle cx="414" cy="316" r="4" class="copper"/>
  <circle cx="586" cy="316" r="4" class="copper"/>

  <!-- RGB LED -->
  <circle cx="500" cy="386" r="34" fill="#f8fafc" stroke="#111827" stroke-width="3"/>
  <circle cx="500" cy="386" r="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <path d="M500 352 L500 420" stroke="#ef4444" stroke-width="4"/>
  <path d="M466 386 L534 386" stroke="#22c55e" stroke-width="4"/>
  <path d="M476 362 L524 410" stroke="#3b82f6" stroke-width="4"/>
  <text x="393" y="451" class="label">main RGB status LED</text>
  <text x="394" y="473" class="tiny">common cathode, R=GPIO7 G=GPIO6 B=GPIO5</text>

  <!-- reset button -->
  <rect x="648" y="352" width="58" height="72" rx="10" class="part"/>
  <circle cx="677" cy="388" r="19" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
  <text x="720" y="381" class="label">WiFi reset</text>
  <text x="720" y="402" class="tiny">GPIO10 to GND, factory mounted</text>

  <!-- WS2812 pads -->
  <rect x="332" y="350" width="70" height="88" rx="8" fill="#064e3b" stroke="#022c22" stroke-width="2"/>
  <circle cx="367" cy="372" r="10" class="copper"/>
  <circle cx="367" cy="394" r="10" class="copper"/>
  <circle cx="367" cy="416" r="10" class="copper"/>
  <text x="226" y="367" class="label">WS2812 pads</text>
  <text x="217" y="390" class="tiny">optional future ring</text>
  <text x="329" y="373" class="tiny">5V</text>
  <text x="322" y="397" class="tiny">DIN</text>
  <text x="320" y="419" class="tiny">GND</text>

  <!-- holes -->
  <circle cx="354" cy="152" r="10" fill="#f3f4f6" stroke="#064e3b" stroke-width="4"/>
  <circle cx="646" cy="152" r="10" fill="#f3f4f6" stroke="#064e3b" stroke-width="4"/>
  <circle cx="354" cy="448" r="10" fill="#f3f4f6" stroke="#064e3b" stroke-width="4"/>
  <circle cx="646" cy="448" r="10" fill="#f3f4f6" stroke="#064e3b" stroke-width="4"/>
  <text x="696" y="460" class="tiny">M1.6 holes optional</text>

  <!-- simplified traces -->
  <path class="trace" d="M500 332 C500 344 500 350 500 352"/>
  <path class="trace" d="M476 332 C450 354 450 378 466 386"/>
  <path class="trace" d="M524 332 C550 354 550 390 524 410"/>
  <path class="trace" d="M392 392 C386 392 378 394 367 394"/>
  <path class="trace" d="M608 292 C650 306 676 332 677 352"/>

  <!-- dimension lines -->
  <line x1="320" y1="575" x2="680" y2="575" class="dim"/>
  <text x="456" y="604" class="small">28 mm</text>
  <line x1="735" y1="120" x2="735" y2="480" class="dim"/>
  <text x="752" y="308" class="small">28 mm</text>

  <!-- callouts -->
  <rect x="40" y="595" width="920" height="118" rx="16" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="66" y="628" class="label">Build decision</text>
  <text x="66" y="656" class="small">V1 should be ordered as SMT assembly, not hand soldered. Choose parts from the assembler library where possible.</text>
  <text x="66" y="682" class="small">RGB is mounted and ready. WS2812 is only a solder pad for later factory/repair use, so it does not block V1 usage.</text>
  <text x="66" y="708" class="small">If you want zero solder forever, V2 can replace the WS2812 pads with a tiny board-to-board connector or remove expansion entirely.</text>
</svg>
