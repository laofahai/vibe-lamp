<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
  <defs>
    <style>
      .bg{fill:#f7f7f4}
      .title{font:700 34px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .sub{font:18px Arial,"Microsoft YaHei",sans-serif;fill:#333}
      .box{fill:#fff;stroke:#111;stroke-width:3}
      .mcu{fill:#f4f7ff;stroke:#1e3a8a;stroke-width:3}
      .led{fill:#fff7df;stroke:#9a5b00;stroke-width:3}
      .note{fill:#eefdf5;stroke:#15803d;stroke-width:2}
      .warn{fill:#fff0f3;stroke:#be123c;stroke-width:2}
      .label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .txt{font:17px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .small{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#333}
      .pin{font:700 16px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .pwr{fill:none;stroke:#dc2626;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .ledpwr{fill:none;stroke:#f97316;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .gnd{fill:none;stroke:#2563eb;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .sig{fill:none;stroke:#15803d;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .usb{fill:none;stroke:#7c3aed;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#777;stroke-width:3;stroke-dasharray:10 7;stroke-linecap:round}
    </style>
  </defs>

  <rect class="bg" width="1400" height="950"/>
  <text class="title" x="45" y="58">Vibe Lamp Core V1：PCBA 连接图</text>
  <text class="sub" x="45" y="90">工厂贴片版：主控、USB-C、WS2812B、按钮、电阻电容全部在板上完成，用户不焊接主板。</text>

  <rect class="mcu" x="500" y="160" width="390" height="380" rx="18"/>
  <text class="label" x="600" y="205">无线主控模组</text>
  <text class="txt" x="595" y="238">ESP32-C3-MINI-1</text>
  <rect class="warn" x="545" y="268" width="300" height="74" rx="10"/>
  <text class="small" x="584" y="298">天线端靠板边</text>
  <text class="small" x="565" y="323">天线区域禁铜、禁走线、禁器件</text>

  <text class="pin" x="518" y="390">3.3V</text>
  <text class="pin" x="518" y="425">GND</text>
  <text class="pin" x="518" y="460">USB D+</text>
  <text class="pin" x="518" y="495">USB D-</text>
  <text class="pin" x="760" y="405">GPIO4：WS2812 数据</text>
  <text class="pin" x="760" y="455">GPIO10：清网按钮</text>
  <text class="pin" x="760" y="505">EN / IO9 / UART 调试焊盘</text>

  <rect class="box" x="70" y="170" width="290" height="190" rx="16"/>
  <text class="label" x="150" y="215">USB-C 母座</text>
  <text class="txt" x="120" y="250">输入 5V，兼做烧录口</text>
  <text class="small" x="120" y="285">CC1 / CC2 各接 5.1k 到地</text>
  <text class="small" x="120" y="315">D+ / D- 接 ESP32-C3 原生 USB</text>

  <rect class="box" x="70" y="430" width="290" height="150" rx="16"/>
  <text class="label" x="135" y="475">3.3V 稳压</text>
  <text class="txt" x="112" y="510">USB 5V 转 3.3V</text>
  <text class="small" x="108" y="542">给 ESP32-C3-MINI-1 供电</text>

  <rect class="led" x="1010" y="160" width="310" height="250" rx="18"/>
  <text class="label" x="1075" y="205">板载状态灯 D1</text>
  <text class="txt" x="1075" y="238">WS2812B 数字 RGB</text>
  <circle cx="1165" cy="305" r="46" fill="#fff" stroke="#111" stroke-width="3"/>
  <circle cx="1165" cy="305" r="28" fill="#22c55e" opacity=".55"/>
  <circle cx="1148" cy="291" r="18" fill="#2563eb" opacity=".65"/>
  <circle cx="1183" cy="291" r="18" fill="#ef4444" opacity=".65"/>
  <text class="small" x="1057" y="375">DIN 来自 GPIO4，DOUT 接扩展焊盘</text>

  <rect class="box" x="925" y="295" width="72" height="30" rx="5"/>
  <text class="small" x="937" y="316">R4 330Ω</text>

  <rect class="box" x="925" y="190" width="72" height="62" rx="8"/>
  <text class="small" x="943" y="215">D3</text>
  <text class="small" x="934" y="238">1N4148</text>

  <rect class="box" x="1010" y="500" width="310" height="130" rx="16"/>
  <text class="label" x="1092" y="545">清网按钮 SW1</text>
  <text class="txt" x="1060" y="580">贴片轻触按键</text>
  <text class="small" x="1045" y="608">GPIO10 按下时接地</text>

  <rect class="box" x="500" y="660" width="390" height="160" rx="16"/>
  <text class="label" x="596" y="705">外接灯带/灯环 P1</text>
  <text class="txt" x="585" y="740">三个焊盘：5V、DATA、GND</text>
  <text class="small" x="560" y="770">D1 是链上第一颗，P1 接 D1.DOUT</text>
  <text class="small" x="568" y="798">接外部灯带时按总灯数调整 NUM_LEDS</text>

  <rect class="box" x="70" y="660" width="290" height="160" rx="16"/>
  <text class="label" x="135" y="705">工程调试焊盘</text>
  <text class="small" x="105" y="742">3.3V、GND、UART TX/RX</text>
  <text class="small" x="105" y="772">EN、下载脚</text>
  <text class="small" x="105" y="802">仅工程调试，不给用户日常使用</text>

  <path class="pwr" d="M360 235 H430 V390 H500"/>
  <path class="pwr" d="M215 360 V430"/>
  <path class="pwr" d="M360 505 H430 V390"/>
  <text class="small" x="382" y="224" fill="#dc2626">USB 5V</text>
  <text class="small" x="382" y="380" fill="#dc2626">3.3V</text>

  <path class="ledpwr" d="M360 235 H925"/>
  <path class="ledpwr" d="M997 221 H1030 V255"/>
  <path class="ledpwr" d="M997 221 H1030 V685 H890"/>
  <text class="small" x="720" y="224" fill="#f97316">LED5V，经 D3 给 D1 降门槛</text>

  <path class="gnd" d="M360 315 H420 V425 H500"/>
  <path class="gnd" d="M360 555 H420"/>
  <path class="gnd" d="M890 425 H970 V385 H1010"/>
  <path class="gnd" d="M1165 410 V455 H970"/>
  <path class="gnd" d="M890 725 H970 V455"/>
  <path class="gnd" d="M1165 630 V650 H970"/>
  <text class="small" x="382" y="444" fill="#2563eb">GND</text>

  <path class="usb" d="M360 285 H455 V460 H500"/>
  <path class="usb" d="M360 310 H445 V495 H500"/>
  <text class="small" x="372" y="278" fill="#7c3aed">USB 数据</text>

  <path class="sig" d="M890 405 H910 V310 H925"/>
  <path class="sig" d="M997 310 H1010"/>
  <text class="small" x="910" y="285" fill="#15803d">WS2812 DATA</text>

  <path class="sig" d="M890 455 H1010"/>
  <path class="sig" d="M1165 630 V650 H970"/>

  <path class="sig" d="M1195 375 H1235 V740 H890"/>
  <text class="small" x="1035" y="455" fill="#15803d">DOUT 到 P1 DATA</text>

  <path class="dash" d="M500 505 H420 V740 H360"/>

  <rect class="note" x="70" y="855" width="1250" height="60" rx="14"/>
  <text class="txt" x="100" y="882">下单说明：所谓“工厂贴片”，就是下单时让工厂把 ESP32-C3、USB-C、D1、SW1、电阻电容全部焊好。</text>
  <text class="txt" x="100" y="906">你收到的是已经装好的小板：插 USB-C 烧固件、配网、装进外壳即可；外接灯带属于扩展玩法。</text>
</svg>
