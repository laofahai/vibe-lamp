<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
  <defs>
    <style>
      .bg{fill:#f7f7f4}
      .title{font:700 34px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .sub{font:18px Arial,"Microsoft YaHei",sans-serif;fill:#333}
      .box{fill:#fff;stroke:#111;stroke-width:3}
      .box2{fill:#f4f7ff;stroke:#1e3a8a;stroke-width:3}
      .part{fill:#fff7df;stroke:#9a5b00;stroke-width:2}
      .note{fill:#eefdf5;stroke:#15803d;stroke-width:2}
      .warn{fill:#fff0f3;stroke:#be123c;stroke-width:2}
      .label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .txt{font:17px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .small{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#333}
      .pin{font:700 16px Arial,"Microsoft YaHei",sans-serif;fill:#111}
      .pwr{fill:none;stroke:#dc2626;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .gnd{fill:none;stroke:#2563eb;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .sig{fill:none;stroke:#15803d;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#111;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#777;stroke-width:3;stroke-dasharray:10 7;stroke-linecap:round}
    </style>
  </defs>

  <rect class="bg" width="1400" height="950"/>
  <text class="title" x="45" y="58">微光状态灯 V1：工厂贴片版连接图</text>
  <text class="sub" x="45" y="90">给硬件工程师/立创EDA代画板使用：所有必需器件由工厂焊好，用户不焊接。</text>

  <!-- main MCU -->
  <rect class="box2" x="500" y="170" width="390" height="360" rx="18"/>
  <text class="label" x="600" y="215">无线主控模组</text>
  <text class="txt" x="595" y="246">ESP32-C3-MINI-1</text>
  <rect class="warn" x="545" y="275" width="300" height="74" rx="10"/>
  <text class="small" x="584" y="305">天线端靠板边</text>
  <text class="small" x="565" y="330">天线区域不要铺铜、不要放金属</text>

  <text class="pin" x="518" y="390">3.3V</text>
  <text class="pin" x="518" y="425">地</text>
  <text class="pin" x="518" y="460">USB 数据+</text>
  <text class="pin" x="518" y="495">USB 数据-</text>

  <text class="pin" x="790" y="385">GPIO7：红灯</text>
  <text class="pin" x="790" y="420">GPIO6：绿灯</text>
  <text class="pin" x="790" y="455">GPIO5：蓝灯</text>
  <text class="pin" x="790" y="490">GPIO4：灯带数据预留</text>
  <text class="pin" x="790" y="525">GPIO10：清网按钮</text>

  <!-- power section -->
  <rect class="box" x="70" y="170" width="290" height="190" rx="16"/>
  <text class="label" x="150" y="215">USB-C 母座</text>
  <text class="txt" x="120" y="250">输入 5V，兼做刷机口</text>
  <text class="small" x="120" y="285">识别脚各接 5.1k 到地</text>
  <text class="small" x="120" y="315">数据线接主控 USB</text>

  <rect class="box" x="70" y="430" width="290" height="150" rx="16"/>
  <text class="label" x="135" y="475">3.3V 稳压</text>
  <text class="txt" x="112" y="510">5V 转 3.3V</text>
  <text class="small" x="108" y="542">输出电流不小于 500mA</text>

  <!-- RGB output -->
  <rect class="box" x="1010" y="160" width="310" height="270" rx="18"/>
  <text class="label" x="1088" y="205">主显示</text>
  <text class="txt" x="1064" y="238">共阴三色灯</text>
  <circle cx="1165" cy="310" r="46" fill="#fff" stroke="#111" stroke-width="3"/>
  <path d="M1135 310h60" stroke="#22c55e" stroke-width="6"/>
  <path d="M1165 280v60" stroke="#ef4444" stroke-width="6"/>
  <path d="M1144 288l44 44" stroke="#2563eb" stroke-width="6"/>
  <text class="small" x="1062" y="390">公共阴极接地</text>

  <rect class="part" x="925" y="245" width="72" height="30" rx="5"/>
  <text class="small" x="937" y="266">330Ω</text>
  <rect class="part" x="925" y="305" width="72" height="30" rx="5"/>
  <text class="small" x="937" y="326">330Ω</text>
  <rect class="part" x="925" y="365" width="72" height="30" rx="5"/>
  <text class="small" x="937" y="386">330Ω</text>

  <!-- reset button -->
  <rect class="box" x="1010" y="500" width="310" height="130" rx="16"/>
  <text class="label" x="1092" y="545">清网按钮</text>
  <text class="txt" x="1060" y="580">贴片轻触按键</text>
  <text class="small" x="1045" y="608">GPIO10 按下时接地</text>

  <!-- WS2812 reserve -->
  <rect class="box" x="500" y="660" width="390" height="160" rx="16"/>
  <text class="label" x="606" y="705">灯带/灯环预留</text>
  <text class="txt" x="585" y="740">三个焊盘：5V、数据、地</text>
  <text class="small" x="570" y="770">V1 不要求用户焊接，只给后续扩展</text>
  <text class="small" x="568" y="798">数据线上串 330Ω，旁边预留 470uF 电容位</text>

  <!-- debug pads -->
  <rect class="box" x="70" y="660" width="290" height="160" rx="16"/>
  <text class="label" x="135" y="705">工程调试焊盘</text>
  <text class="small" x="105" y="742">3.3V、地、串口收发</text>
  <text class="small" x="105" y="772">使能脚、下载脚</text>
  <text class="small" x="105" y="802">仅工程调试，不给用户使用</text>

  <!-- connections: power -->
  <path class="pwr" d="M360 235 H435 V390 H500"/>
  <path class="pwr" d="M215 360 V430"/>
  <path class="pwr" d="M360 505 H435 V390"/>
  <text class="small" x="382" y="224" fill="#dc2626">5V 电源</text>
  <text class="small" x="382" y="380" fill="#dc2626">3.3V 电源</text>

  <!-- ground bus -->
  <path class="gnd" d="M360 315 H420 V425 H500"/>
  <path class="gnd" d="M360 555 H420"/>
  <path class="gnd" d="M890 425 H970 V390 H1010"/>
  <path class="gnd" d="M1165 430 V455 H970"/>
  <path class="gnd" d="M890 725 H970 V455"/>
  <text class="small" x="382" y="444" fill="#2563eb">地线</text>

  <!-- USB data -->
  <path class="sig" d="M360 285 H455 V460 H500"/>
  <path class="sig" d="M360 310 H445 V495 H500"/>
  <text class="small" x="372" y="278" fill="#15803d">USB 数据</text>

  <!-- RGB signals -->
  <path class="sig" d="M890 385 H925"/>
  <path class="sig" d="M997 260 H1010"/>
  <path class="sig" d="M890 420 H910 V320 H925"/>
  <path class="sig" d="M997 320 H1010"/>
  <path class="sig" d="M890 455 H910 V380 H925"/>
  <path class="sig" d="M997 380 H1010"/>
  <text class="small" x="910" y="226" fill="#15803d">三路调光信号</text>

  <!-- WS2812 signal -->
  <path class="sig" d="M890 490 H950 V740 H890"/>

  <!-- reset signal -->
  <path class="sig" d="M890 525 H1010"/>

  <!-- debug dashed -->
  <path class="dash" d="M500 505 H420 V740 H360"/>

  <!-- bottom note -->
  <rect class="note" x="70" y="855" width="1250" height="60" rx="14"/>
  <text class="txt" x="100" y="882">贴片说明：所谓“工厂贴片”，就是下单时让工厂把主控、USB-C、灯、按钮、电阻电容全部焊好。</text>
  <text class="txt" x="100" y="906">你收到的是已经装好的小板，不需要焊接；只需要插 USB-C 刷固件、配网、装进外壳。</text>
</svg>
